<div class="relative min-h-[calc(100vh-48px)] overflow-hidden">

  <!-- COZY background logo -->
  <div class="absolute inset-0 flex items-center justify-center pointer-events-none select-none" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1456 820" fill="none"
         class="w-[160vw] opacity-[0.06] text-black">
      <text
        x="50%"
        y="72%"
        text-anchor="middle"
        font-family="'Times New Roman', Georgia, serif"
        font-size="520"
        font-weight="900"
        fill="currentColor"
        letter-spacing="-10"
      >COZY</text>
    </svg>
  </div>

  <!-- Page content -->
  <div class="relative z-10 min-h-[calc(100vh-48px)] flex items-center justify-center px-6 py-16">
  <div class="w-full max-w-2xl">

    {% if user.is_authenticated %}
    <!-- Logged-in state -->
    <div class="bg-white border border-[#e8e8e8] rounded-sm p-8 mb-6">
      <div class="flex items-center gap-5 mb-8">
        <div class="w-14 h-14 rounded-full bg-[#f0f0ee] flex items-center justify-center flex-shrink-0">
          <svg class="w-7 h-7 text-[#aaa]" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
          </svg>
        </div>
        <div>
          <p class="text-[15px] font-semibold text-black">
            {% if user.get_full_name %}{{ user.get_full_name }}{% else %}{{ user.username }}{% endif %}
          </p>
        </div>
      </div>

      <form
        method="post"
        action="{% url 'accounts:logout' %}"
        hx-post="{% url 'accounts:logout' %}"
        hx-target="#main-content"
        hx-swap="innerHTML"
        hx-push-url="true"
      >
        {% csrf_token %}
        <button
          type="submit"
          class="w-full py-3 px-5 border border-black text-black text-[12px] font-semibold uppercase tracking-widest hover:bg-black hover:text-white transition-colors"
        >Sign Out</button>
      </form>
    </div>

    {% else %}
    <!-- Guest state -->
    <div class="bg-white border border-[#e8e8e8] rounded-sm p-8 mb-6">
      <div class="flex items-center gap-5 mb-8">
        <div class="w-14 h-14 rounded-full bg-[#f0f0ee] flex items-center justify-center flex-shrink-0">
          <svg class="w-7 h-7 text-[#aaa]" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
          </svg>
        </div>
        <div>
          <p class="text-[15px] font-semibold text-black">Guest</p>
          <p class="text-[12px] text-[#aaa] uppercase tracking-widest mt-0.5">Not signed in</p>
        </div>
      </div>

      <div class="grid grid-cols-1 gap-3">
        <a
          href="{% url 'accounts:login' %}"
          hx-get="{% url 'accounts:login' %}"
          hx-target="#main-content"
          hx-swap="innerHTML transition:true"
          hx-push-url="true"
          class="block w-full py-3 px-5 bg-black text-white text-[12px] font-semibold uppercase tracking-widest hover:bg-[#222] transition-colors text-center"
        >Sign In</a>
        <a
          href="{% url 'accounts:register' %}"
          hx-get="{% url 'accounts:register' %}"
          hx-target="#main-content"
          hx-swap="innerHTML transition:true"
          hx-push-url="true"
          class="block w-full py-3 px-5 border border-black text-black text-[12px] font-semibold uppercase tracking-widest hover:bg-[#f5f5f3] transition-colors text-center"
        >Create Account</a>
      </div>
    </div>
    {% endif %}

    <!-- Quick links -->
    <div class="bg-white border border-[#e8e8e8] rounded-sm divide-y divide-[#f0f0ee]">
      <a
        href="{% url 'orders:checkout' %}"
        hx-get="{% url 'orders:checkout' %}"
        hx-target="#main-content"
        hx-swap="innerHTML transition:true"
        hx-push-url="true"
        class="flex items-center justify-between px-6 py-4 hover:bg-[#fafafa] transition-colors group"
      >
        <div class="flex items-center gap-3">
          <svg class="w-5 h-5 text-[#aaa] group-hover:text-black transition-colors" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z"/>
          </svg>
          <span class="text-[13px] font-semibold uppercase tracking-widest text-black">My Orders</span>
        </div>
        <svg class="w-4 h-4 text-[#ccc] group-hover:text-black transition-colors" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/>
        </svg>
      </a>

      <a
        href="{% url 'catalog:catalog' %}"
        hx-get="{% url 'catalog:catalog' %}"
        hx-target="#main-content"
        hx-swap="innerHTML transition:true"
        hx-push-url="true"
        class="flex items-center justify-between px-6 py-4 hover:bg-[#fafafa] transition-colors group"
      >
        <div class="flex items-center gap-3">
          <svg class="w-5 h-5 text-[#aaa] group-hover:text-black transition-colors" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
          </svg>
          <span class="text-[13px] font-semibold uppercase tracking-widest text-black">Wishlist</span>
        </div>
        <svg class="w-4 h-4 text-[#ccc] group-hover:text-black transition-colors" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/>
        </svg>
      </a>

      <a
        href="{% url 'catalog:catalog' %}"
        hx-get="{% url 'catalog:catalog' %}"
        hx-target="#main-content"
        hx-swap="innerHTML transition:true"
        hx-push-url="true"
        class="flex items-center justify-between px-6 py-4 hover:bg-[#fafafa] transition-colors group"
      >
        <div class="flex items-center gap-3">
          <svg class="w-5 h-5 text-[#aaa] group-hover:text-black transition-colors" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007z"/>
          </svg>
          <span class="text-[13px] font-semibold uppercase tracking-widest text-black">Continue Shopping</span>
        </div>
        <svg class="w-4 h-4 text-[#ccc] group-hover:text-black transition-colors" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/>
        </svg>
      </a>
    </div>

  </div>
  </div>
</div>
