<div class="col-span-2 flex flex-col items-center justify-center py-24 text-center">
  <div class="w-12 h-12 border border-[#2a2a2a] flex items-center justify-center mb-8">
    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
    </svg>
  </div>
  <h2 class="text-xl font-semibold uppercase tracking-tight text-[#eee] mb-4">Order Confirmed</h2>
  <p class="text-xs uppercase tracking-widest text-[#888] mb-2">Order #{{ order.pk }}</p>
  <p class="text-sm text-[#aaa] mb-8 max-w-sm">
    Thank you, {{ order.full_name }}. Your order has been received and is being processed.
    A confirmation will be sent to {{ order.email }}.
  </p>
  <a
    href="{% url 'catalog:catalog' %}"
    class="bg-white text-black px-8 py-4 text-xs font-bold uppercase tracking-widest hover:bg-[#eee] transition-colors"
  >Continue Shopping</a>
</div>
