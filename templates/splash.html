<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COZYSHOP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background-color: #f5f5f3;
      font-family: Georgia, 'Times New Roman', serif;
      overflow: hidden;
    }

    /* ── Top bar ── */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #topbar-letter {
      font-style: italic;
      font-size: 1.5rem;
      color: #1a1a1a;
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      letter-spacing: 0.05em;
    }

    #topbar-letter.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Center choice ── */
    #center {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.35s ease;
    }

    #center.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .gender-choice {
      display: flex;
      align-items: center;
      gap: 0.5em;
      font-style: italic;
      font-size: clamp(2rem, 6vw, 5rem);
      color: #1a1a1a;
      user-select: none;
    }

    .gender-choice button {
      background: none;
      border: none;
      cursor: pointer;
      font: inherit;
      font-style: italic;
      color: inherit;
      padding: 0;
      transition: opacity 0.2s;
    }

    .gender-choice button:hover { opacity: 0.4; }

    .gender-choice .sep {
      color: #aaa;
      font-style: normal;
    }

    /* ── Categories panel ── */
    #categories {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      opacity: 0;
      transform: translateY(24px);
      pointer-events: none;
      transition: opacity 0.4s ease 0.15s, transform 0.4s ease 0.15s;
    }

    #categories.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    #categories a {
      font-style: italic;
      font-size: clamp(1.1rem, 3vw, 2rem);
      color: #1a1a1a;
      text-decoration: none;
      padding: 0.35em 0;
      letter-spacing: 0.03em;
      transition: opacity 0.2s;
    }

    #categories a:hover { opacity: 0.4; }

    /* back button */
    #back-btn {
      position: fixed;
      top: 16px;
      left: 20px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 0.85rem;
      color: #aaa;
      letter-spacing: 0.05em;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease 0.3s, color 0.2s;
      z-index: 20;
    }

    #back-btn.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #back-btn:hover { color: #1a1a1a; }
  </style>
</head>
<body>

  <!-- Top bar with selected letter -->
  <div id="topbar">
    <span id="topbar-letter"></span>
  </div>

  <!-- Back button -->
  <button id="back-btn" onclick="goBack()">← back</button>

  <!-- Center M / W -->
  <div id="center">
    <div class="gender-choice">
      <button onclick="selectGender('man', 'M')">M</button>
      <span class="sep">/</span>
      <button onclick="selectGender('woman', 'W')">W</button>
    </div>
  </div>

  <!-- Categories -->
  <div id="categories">
    <a id="cat-all"        href="#">All</a>
    <a id="cat-knitwear"   href="#">Knitwear</a>
    <a id="cat-tops"       href="#">Tops</a>
    <a id="cat-outerwear"  href="#">Outerwear</a>
    <a id="cat-bottoms"    href="#">Bottoms</a>
    <a id="cat-dresses"    href="#">Dresses</a>
    <a id="cat-jumpsuits"  href="#">Jumpsuits</a>
    <a id="cat-loungewear" href="#">Loungewear</a>
  </div>

  <script>
    var MAN_CATS  = ['all','knitwear','tops','outerwear','bottoms'];
    var WOMAN_CATS = ['all','knitwear','tops','outerwear','bottoms','dresses','jumpsuits','loungewear'];

    function selectGender(gender, letter) {
      // Persist gender for menu
      try { localStorage.setItem('cozy_gender', gender); } catch(e) {}

      // Show letter in topbar
      var tl = document.getElementById('topbar-letter');
      tl.textContent = letter;
      tl.classList.add('visible');

      // Hide center choice
      document.getElementById('center').classList.add('hidden');

      // Show back button
      document.getElementById('back-btn').classList.add('visible');

      // Build category links
      var base = '/shop/?gender=' + gender;
      var cats = gender === 'man' ? MAN_CATS : WOMAN_CATS;

      // Hide all first
      ['all','knitwear','tops','outerwear','bottoms','dresses','jumpsuits','loungewear'].forEach(function(c) {
        var el = document.getElementById('cat-' + c);
        el.style.display = 'none';
      });

      // Set hrefs and show relevant
      document.getElementById('cat-all').href = base;
      document.getElementById('cat-all').style.display = '';

      cats.forEach(function(c) {
        var el = document.getElementById('cat-' + c);
        if (c === 'all') {
          el.href = base;
        } else {
          el.href = base + '&category=' + c;
        }
        el.style.display = '';
      });

      // Show categories panel
      document.getElementById('categories').classList.add('visible');
    }

    function goBack() {
      document.getElementById('topbar-letter').classList.remove('visible');
      document.getElementById('center').classList.remove('hidden');
      document.getElementById('back-btn').classList.remove('visible');
      document.getElementById('categories').classList.remove('visible');
    }
  </script>

</body>
</html>
