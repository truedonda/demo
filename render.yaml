databases:
  - name: cozyshop-db
    databaseName: cozyshop
    user: cozyshop
    plan: free

services:
  - type: redis
    name: cozyshop-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: cozyshop
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.render
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: cozyshop.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: cozyshop-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: cozyshop-redis
          type: redis
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.13.5"
      - key: NODE_VERSION
        value: "20"
